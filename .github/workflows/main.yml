name: TJK Data Scraper
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Paketleri Yukle
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas beautifulsoup4 lxml  # Tüm ihtimalleri ekledik
        
      - name: Veriyi Cek
        run: python scraper.py
        
      - name: Kaydet ve Gonder
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add veriler.json
          git commit -m "Güncel Veri: $(date)" || echo "Değişiklik yok"
          git push origin main
