name: TJK Otomatik Sistem
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Tüm geçmişi çek ki çakışma olmasın
      
      - name: Python Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Kutuphaneleri Yukle
        run: |
          python -m pip install --upgrade pip
          pip install requests
          
      - name: Veriyi Cek
        run: python scraper.py
        
      - name: GitHub'a Gonder (Zorla)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add veriler.json
          # Eğer değişiklik yoksa hata vermeden devam etmesini sağlar
          git commit -m "📊 Otomatik Bülten Güncelleme" || exit 0
          # Çakışmaları önlemek için önce çek, sonra üzerine yaz
          git pull origin main --rebase
          git push origin main
