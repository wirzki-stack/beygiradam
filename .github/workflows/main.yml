name: TJK Otomatik Sistem
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Python Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Kutuphaneleri Yukle
        run: |
          python -m pip install --upgrade pip
          pip install requests
          
      - name: Veriyi Cek
        run: python scraper.py
        
      - name: GitHub'a Gonder (Kesin Cozum)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Mevcut degisiklikleri cek ve cakismalari onlemek icin rebase yap
          git pull origin main --rebase
          
          git add veriler.json
          
          # Eger dosya degismediyse hata vermeden bitir
          git commit -m "📊 Otomatik Bülten Güncelleme" || exit 0
          
          # Reddedilmeyi onlemek icin zorla gonder (force push)
          git push origin main --force
