name: TJK Data Scraper
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Yetkiyi doğrudan içeri alıyoruz
      
      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Paketleri Yukle
        run: pip install requests
        
      - name: Veriyi Cek
        run: python scraper.py
        
      - name: Kaydet ve Gonder
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add veriler.json
          git commit -m "📊 Otomatik Guncelleme: $(date)" || echo "Degisiklik yok"
          git push origin main
