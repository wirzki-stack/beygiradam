name: TJK Data Scraper
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Sürüm güncellendi (v3 -> v4)
      
      - name: Python Kur
        uses: actions/setup-python@v5 # Sürüm güncellendi (v4 -> v5)
        with:
          python-version: '3.10'
          
      - name: Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas # Pandas da eklendi, garanti olsun
        
      - name: Veriyi Çek
        run: python scraper.py
        
      - name: Veriyi Kaydet ve Gönder
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add veriler.json
          git commit -m "📊 Otomatik Veri Guncelleme: $(date)" || echo "Degisiklik yok"
          git push origin main
