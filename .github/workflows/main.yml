name: TJK Otomatik Sistem
on:
  schedule:
    - cron: '0 6 * * *' # Her sabah 06:00'da çalışır
  workflow_dispatch: # Manuel çalıştırma butonu

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests
      - name: Veriyi Guncelle
        run: python scraper.py
      - name: GitHub'a Yukle
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add veriler.json
          git commit -m "📊 Otomatik Bülten Güncelleme" || echo "Degisiklik yok"
          git push origin main
